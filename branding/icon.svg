<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <rect x="0" y="0" width="128" height="128" rx="28" fill="#141a26"/>
  <rect x="0" y="64" width="128" height="64" rx="28" fill="#0f141d" opacity="0.55"/>
  <!-- shield -->
  <path d="M64 18 L101 31 V63 C101 88 85 103 64 111 C43 103 27 88 27 63 V31 Z"
        fill="#d0392b" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  <!-- bull -->
  <g fill="#ffffff">
    <!-- horns: sweep outward from the head, then curve up to points -->
    <path d="M50 54 C 36 56 24 52 19 40 C 17 32 20 30 23 34 C 27 45 39 50 52 49 Z"/>
    <path d="M78 54 C 92 56 104 52 109 40 C 111 32 108 30 105 34 C 101 45 89 50 76 49 Z"/>
    <!-- head -->
    <rect x="46" y="49" width="36" height="35" rx="15"/>
    <!-- muzzle -->
    <rect x="52" y="72" width="24" height="15" rx="7.5"/>
  </g>
  <!-- features cut in shield red -->
  <g fill="#d0392b">
    <circle cx="56" cy="63" r="3.2"/>
    <circle cx="72" cy="63" r="3.2"/>
    <ellipse cx="59" cy="79" rx="2.3" ry="2.9"/>
    <ellipse cx="69" cy="79" rx="2.3" ry="2.9"/>
  </g>
</svg>
