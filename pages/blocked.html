<!doctype html>
<html>
<head><meta charset="utf-8"><title>Blocked by Bulwark</title>
<style>
  body{font:16px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;background:#12151c;color:#e8eaed;display:grid;place-items:center;height:100vh;margin:0;text-align:center}
  .card{background:#1a1e27;padding:36px 44px;border-radius:16px;max-width:460px}
  .mark{width:56px;height:56px;margin:0 auto 12px;display:block}
  h1{color:#d0392b;margin:0 0 6px;font-size:22px}
  .host{color:#e8eaed;font-weight:700;word-break:break-all}
  p{color:#8a93a6;margin:8px 0 0}
  .actions{display:flex;gap:10px;justify-content:center;margin-top:22px}
  button{border:0;border-radius:10px;padding:10px 18px;font-size:14px;cursor:pointer}
  .back{background:#2ec172;color:#fff}
  .proceed{background:#232833;color:#e8eaed}
  .fine{margin-top:14px;font-size:12px;color:#5c6773}
</style></head>
<body>
  <div class="card">
    <img class="mark" src="../icons/icon128.png" alt="">
    <h1>Blocked</h1>
    <p>Bulwark is blocking <span class="host" id="host">this site</span>.</p>
    <div class="actions">
      <button class="back" id="back">Go back</button>
      <button class="proceed" id="proceed">Proceed anyway</button>
    </div>
    <div class="fine">Proceeding allows this site until you restart Chrome.</div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
