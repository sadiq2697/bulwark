<!doctype html>
<html>
<head><meta charset="utf-8"><title>Bulwark filtering log</title>
<style>
  :root { --bg:#f5f6f8; --surface:#fff; --ink:#16202e; --ink2:#5c6773; --line:#e6e9ee; --danger:#c9382a; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:13px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif; }
  header { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; background:var(--surface); border-bottom:1px solid var(--line); }
  header .l { display:flex; align-items:center; gap:9px; font-weight:800; font-size:16px; }
  header button { border:0; border-radius:8px; padding:8px 14px; background:#eef0f3; color:var(--ink); cursor:pointer; }
  main { padding:16px 24px; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; color:var(--ink2); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.05em; padding:8px 10px; border-bottom:2px solid var(--line); }
  td { padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  td.url { word-break:break-all; color:var(--ink2); }
  .tag { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; font-weight:600; }
  .tag.ads { background:#fdecea; color:var(--danger); }
  .tag.trackers { background:#eef3ff; color:#2b5dd6; }
  .tag.other { background:#eef0f3; color:var(--ink2); }
  .empty { color:var(--ink2); padding:40px; text-align:center; }
</style></head>
<body>
  <header>
    <div class="l"><img src="../icons/icon32.png" alt="" width="20" height="20"><span>Filtering log</span></div>
    <button id="refresh">Refresh</button>
  </header>
  <main><div id="content"></div></main>
  <script src="log.js"></script>
</body>
</html>
