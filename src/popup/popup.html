<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="popup.css"></head>
<body>
  <header class="top">
    <div class="brand"><img src="../../icons/icon32.png" alt="" width="20" height="20"><span>Bulwark</span></div>
    <button id="openOptions" class="icon-btn" title="Settings" aria-label="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <section class="status">
    <div class="site" id="siteLabel">This site</div>
    <label class="bigswitch"><input type="checkbox" id="siteToggle"><span class="track"><span class="thumb"></span></span></label>
    <div class="statusText" id="statusText">Protection on</div>
  </section>

  <div class="notches" aria-hidden="true"></div>

  <div class="counts">
    <div class="count"><b id="pageCount">0</b><small>blocked here</small></div>
    <div class="count"><b id="totalCount">0</b><small>blocked total</small></div>
  </div>

  <nav class="tabs">
    <button class="tab active" data-tab="actions">Actions</button>
    <button class="tab" data-tab="stats">Statistics</button>
  </nav>

  <section class="panel" id="panel-actions">
    <button class="row" id="pick"><span class="ri">◈</span> Hide an element on this page</button>
    <button class="row" id="undoHide"><span class="ri">↺</span> Undo last hide</button>
    <button class="row" id="openLog"><span class="ri">▤</span> Open filtering log</button>
    <a class="row" id="report" href="https://github.com/sadiq2697/bulwark/issues" target="_blank" rel="noopener"><span class="ri">⚑</span> Report an issue</a>
    <button class="row" id="settings2"><span class="ri">⚙</span> Open settings</button>
  </section>

  <section class="panel hidden" id="panel-stats">
    <div class="period"><button class="pchip active" data-days="7">7 days</button><button class="pchip" data-days="30">30 days</button></div>
    <div class="chartwrap"><svg id="spark" viewBox="0 0 300 72" preserveAspectRatio="none"></svg><div class="chartaxis" id="chartaxis"></div></div>
    <div class="breakdown" id="breakdown"></div>
  </section>

  <script type="module" src="popup.js"></script>
</body>
</html>
