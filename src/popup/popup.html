<!doctype html>
<html>
<head><meta charset="utf-8"><link rel="stylesheet" href="popup.css"></head>
<body>
  <header><span class="logo">Bulwark</span><span id="badge" class="badge"></span></header>
  <div class="row"><span>Blocking enabled</span><label class="switch"><input type="checkbox" id="enabled"><span class="slider"></span></label></div>
  <div class="row"><span id="siteLabel">This site</span><label class="switch"><input type="checkbox" id="siteAllow"><span class="slider"></span></label></div>
  <div class="stats"><div><b id="pageCount">0</b><small>this page</small></div><div><b id="totalCount">0</b><small>total</small></div></div>
  <button id="pick" class="btn">Pick element to hide</button>
  <button id="openOptions" class="btn ghost">Settings</button>
  <script type="module" src="popup.js"></script>
</body>
</html>
